<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>日程本 2026</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap");

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #ffffff;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        color: #2d3130;
      }

      header {
        text-align: center;
        padding: 32px 16px 16px;
      }

      header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: #2d3130;
      }

      header p {
        margin: 8px 0 0;
        font-size: 14px;
        color: #7a807e;
      }

      #pages {
        display: flex;
        flex-direction: column;
        gap: 32px;
        padding: 24px 0 0;
      }

      #pages canvas {
        display: block;
        margin: 0;
        border: 1px solid #dcdad4;
        border-radius: 4px;
        background: #ffffff;
      }

      .actions-bar {
        display: flex;
        gap: 16px;
        padding: 32px 0 64px;
      }

      button {
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        background: #2d3130;
        color: #ffffff;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button.secondary {
        background: transparent;
        color: #2d3130;
        border: 1px solid #2d3130;
      }

      button:hover {
        background: #c05c46; /* Accent color hover */
        color: #ffffff;
        border-color: transparent;
      }

      button:active {
        background: #a04c38;
      }

      @page {
        size: 1560px 1300px;
        margin: 0;
      }

      @media print {
        body {
          background: #fff;
          margin: 0;
        }
        header {
          display: none;
        }
        .actions-bar {
          display: none;
        }
        #pages {
          gap: 0;
          padding: 0;
        }
        #pages canvas {
          break-after: page;
          border: none;
          border-radius: 0;
        }
        #pages canvas:last-child {
          break-after: avoid;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>月面日程本 2026</h1>
      <p>静海基地 (Mare Tranquillitatis) 环境日志 & 个人手帐</p>
    </header>

    <div id="pages"></div>

    <div class="actions-bar">
      <button onclick="savePDF()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        导出 PDF
      </button>
      <button class="secondary" onclick="window.print()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="6 9 6 2 18 2 18 9" />
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
          <rect x="6" y="14" width="12" height="8" />
        </svg>
        打 印
      </button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="bundle.js"></script>
  </body>
</html>
