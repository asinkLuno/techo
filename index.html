<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>日程本</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #fff;
        font-family: sans-serif;
      }
      #c {
        margin: 0;
      }
      button {
        padding: 8px 24px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #aaa;
        border-radius: 4px;
        background: #fff;
      }
      button:hover {
        background: #f0f0f0;
      }
      /* print only the canvas, no button */
      @page {
        size: 1560px 1300px;
        margin: 0;
      }
      @media print {
        body {
          background: #fff;
          margin: 0;
        }
        button {
          display: none;
        }
        #c {
          box-shadow: none;
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div style="display: flex; gap: 12px">
      <button onclick="savePDF()">导出 PDF</button>
      <button onclick="window.print()">打印</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="bundle.js"></script>
  </body>
</html>
